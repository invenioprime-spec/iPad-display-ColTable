<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Link</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: none; position: absolute; top:0; left:0; z-index: 10; }
        #status-text { font-size: 1.5rem; text-align: center; z-index: 5; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="status-text">System Live. Awaiting embed signal...</div>
    
    <iframe id="studio-frame" allow="autoplay; encrypted-media"></iframe>

    <script>
        const statusText = document.getElementById('status-text');
        const frameElement = document.getElementById('studio-frame');

        const pusher = new Pusher('bc54e1da8192db0508d6', {
            cluster: 'us2',
            forceTLS: true
        });

        // We use universally allowed, open web embed streams for our test
        const videoAssets = {
    'space': 'https://storage.googleapis.com/invenio-studio-loops/Milky Way (1).mp4',
    'subcellular': 'https://storage.googleapis.com/invenio-studio-loops/Cells Dividing.mov'
};

        const channel = pusher.subscribe('studio-channel');

        channel.bind('change-scene', function(data) {
            const incomingTheme = data.scene;
            statusText.innerText = "Loading Stream: " + incomingTheme;
            
            if (videoAssets[incomingTheme]) {
                frameElement.src = videoAssets[incomingTheme];
                frameElement.style.display = 'block';
            } else {
                statusText.innerText = "Unknown theme: " + incomingTheme;
            }
        });
    </script>
</body>
</html>
