<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Link</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top:0; left:0; z-index: 10; }
        #status-text { font-size: 1.5rem; text-align: center; z-index: 5; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="status-text">System Live. Listening for commands...</div>
    <video id="studio-video" autoplay loop muted playsinline></video>

    <script>
        const statusText = document.getElementById('status-text');
        const videoElement = document.getElementById('studio-video');

        const pusher = new Pusher('bc54e1da8192db0508d6', {
            cluster: 'us2',
            forceTLS: true
        });

        const videoAssets = {
            // A lightweight web-optimized stream that requires ZERO user clicks
            'space': 'https://vjs.zencdn.net/v/oceans.mp4',
            'subcellular': 'https://vjs.zencdn.net/v/oceans.mp4'
        };

        const channel = pusher.subscribe('studio-channel');

        channel.bind('change-scene', function(data) {
            const incomingTheme = data.scene;
            
            if (videoAssets[incomingTheme]) {
                statusText.innerText = "Loading Video: " + incomingTheme;
                videoElement.src = videoAssets[incomingTheme];
                videoElement.style.display = 'block';
                
                // Force playback without catching errors to let the native browser handle it
                videoElement.play();
            } else {
                statusText.innerText = "Unknown theme received: " + incomingTheme;
            }
        });
    </script>
</body>
</html>
